apiVersion: platformctl.io/v1
kind: PlatformTemplate
name: local-kind-standard
description: Local Kind developer platform with ArgoCD, monitoring, and ingress.

requirements:
  tools:
    - name: docker
      install_hint: https://docs.docker.com/get-docker/
    - name: kind
      install_hint: https://kind.sigs.k8s.io/docs/user/quick-start/
    - name: kubectl
      install_hint: https://kubernetes.io/docs/tasks/tools/
    - name: helm
      install_hint: https://helm.sh/docs/intro/install/

inputs:
  project_name:
    required: true
  cluster_name:
    required: true
    default: platformctl-local

defaults:
  argocd_namespace: argocd
  monitoring_namespace: monitoring
  grafana_admin_user: admin
  ingress_namespace: ingress-nginx
  environments:
    - name: dev
      namespace: dev
      cpu: "2"
      memory: "4Gi"
      default_cpu: "500m"
      default_memory: "512Mi"
    - name: staging
      namespace: staging
      cpu: "4"
      memory: "8Gi"
      default_cpu: "500m"
      default_memory: "512Mi"
    - name: production
      namespace: production
      cpu: "8"
      memory: "16Gi"
      default_cpu: "1"
      default_memory: "1Gi"

files:
  - path: generated/kind/config.yaml
    content: |
      kind: Cluster
      apiVersion: kind.x-k8s.io/v1alpha4
      nodes:
        - role: control-plane
          extraPortMappings:
            - containerPort: 80
              hostPort: 8080
              protocol: TCP
            - containerPort: 443
              hostPort: 8443
              protocol: TCP
  - path: generated/kubernetes/environments.yaml
    content: |
      {{- range .Values.environments }}
      ---
      apiVersion: v1
      kind: Namespace
      metadata:
        name: {{ .namespace }}
      ---
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: {{ .namespace }}-quota
        namespace: {{ .namespace }}
      spec:
        hard:
          requests.cpu: "{{ .cpu }}"
          requests.memory: "{{ .memory }}"
          limits.cpu: "{{ .cpu }}"
          limits.memory: "{{ .memory }}"
      ---
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: {{ .namespace }}-limits
        namespace: {{ .namespace }}
      spec:
        limits:
          - type: Container
            default:
              cpu: "{{ .default_cpu }}"
              memory: "{{ .default_memory }}"
            defaultRequest:
              cpu: "{{ .default_cpu }}"
              memory: "{{ .default_memory }}"
      {{- end }}
  - path: generated/helm-values/argocd-values.yaml
    content: |
      configs:
        params:
          server.insecure: true
  - path: generated/helm-values/kube-prometheus-stack-values.yaml
    content: |
      grafana:
        adminUser: "{{ .Values.grafana_admin_user }}"
  - path: generated/helm-values/ingress-nginx-values.yaml
    content: |
      controller:
        service:
          type: NodePort

workflow:
  up:
    - name: kind create cluster
      command: kind
      args: ["create", "cluster", "--name", "{{ .Values.cluster_name }}", "--config", "generated/kind/config.yaml"]
    - name: helm repo add argo
      command: helm
      args: ["repo", "add", "argo", "https://argoproj.github.io/argo-helm", "--force-update"]
    - name: helm repo add prometheus-community
      command: helm
      args: ["repo", "add", "prometheus-community", "https://prometheus-community.github.io/helm-charts", "--force-update"]
    - name: helm repo add ingress-nginx
      command: helm
      args: ["repo", "add", "ingress-nginx", "https://kubernetes.github.io/ingress-nginx", "--force-update"]
    - name: helm repo update
      command: helm
      args: ["repo", "update"]
    - name: kubectl apply platform manifests
      command: kubectl
      args: ["apply", "-f", "generated/kubernetes"]
    - name: install ArgoCD
      command: helm
      args: ["upgrade", "--install", "argocd", "argo/argo-cd", "-n", "{{ .Values.argocd_namespace }}", "--create-namespace", "-f", "generated/helm-values/argocd-values.yaml"]
    - name: install monitoring
      command: helm
      args: ["upgrade", "--install", "monitoring", "prometheus-community/kube-prometheus-stack", "-n", "{{ .Values.monitoring_namespace }}", "--create-namespace", "-f", "generated/helm-values/kube-prometheus-stack-values.yaml"]
    - name: install ingress-nginx
      command: helm
      args: ["upgrade", "--install", "ingress-nginx", "ingress-nginx/ingress-nginx", "-n", "{{ .Values.ingress_namespace }}", "--create-namespace", "-f", "generated/helm-values/ingress-nginx-values.yaml"]
  down:
    - name: kind delete cluster
      command: kind
      args: ["delete", "cluster", "--name", "{{ .Values.cluster_name }}"]

outputs:
  success:
    - "Check cluster: kubectl cluster-info --context kind-{{ .Values.cluster_name }}"
    - "Check pods: kubectl get pods -A"
    - "ArgoCD: kubectl -n {{ .Values.argocd_namespace }} port-forward svc/argocd-server 8080:443"
    - "Grafana: kubectl -n {{ .Values.monitoring_namespace }} port-forward svc/monitoring-grafana 3000:80"
