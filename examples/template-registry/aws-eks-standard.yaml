name: aws-eks-standard
description: Standard AWS EKS developer platform with ArgoCD, monitoring, and ingress.

defaults:
  project_name: platformctl-demo
  environment_prefix: platform
  aws_region: eu-central-1
  aws_profile: default
  cluster_name: platform-main
  kubernetes_version: "1.34"
  vpc_cidr: "10.0.0.0/16"
  az_count: 2
  node_group_name: general
  node_instance_type: t3.medium
  node_desired_capacity: 2
  node_min_capacity: 1
  node_max_capacity: 4

  environments:
    - name: dev
      namespace: dev
      resource_quota:
        cpu: "2"
        memory: "4Gi"
      limit_range:
        default_cpu: "500m"
        default_memory: "512Mi"

    - name: staging
      namespace: staging
      resource_quota:
        cpu: "4"
        memory: "8Gi"
      limit_range:
        default_cpu: "500m"
        default_memory: "512Mi"

    - name: production
      namespace: production
      resource_quota:
        cpu: "8"
        memory: "16Gi"
      limit_range:
        default_cpu: "1"
        default_memory: "1Gi"

  argocd_enabled: true
  argocd_namespace: argocd
  monitoring_enabled: true
  monitoring_namespace: monitoring
  grafana_admin_user: admin
  ingress_enabled: true
  ingress_controller: nginx
  ingress_namespace: ingress-nginx
  cert_manager_enabled: false
  external_dns_enabled: false
  aws_load_balancer_controller_enabled: false
