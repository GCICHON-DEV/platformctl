apiVersion: platformctl.io/v1
kind: PlatformTemplate
name: azure-aks-standard
description: Standard Azure AKS developer platform with ArgoCD, monitoring, and ingress.

requirements:
  tools:
    - name: terraform
      install_hint: https://developer.hashicorp.com/terraform/install
    - name: az
      install_hint: https://learn.microsoft.com/cli/azure/install-azure-cli
    - name: kubectl
      install_hint: https://kubernetes.io/docs/tasks/tools/
    - name: helm
      install_hint: https://helm.sh/docs/intro/install/

inputs:
  project_name:
    required: true
  azure_location:
    required: true
    default: westeurope
  resource_group:
    required: true
  cluster_name:
    required: true
  kubernetes_version:
    required: false
    default: "1.30"
  node_vm_size:
    required: false
    default: Standard_B2s
  node_count:
    required: false
    default: 2

defaults:
  environment_prefix: platform
  argocd_namespace: argocd
  monitoring_namespace: monitoring
  grafana_admin_user: admin
  ingress_namespace: ingress-nginx
  environments:
    - name: dev
      namespace: dev
      cpu: "2"
      memory: "4Gi"
      default_cpu: "500m"
      default_memory: "512Mi"
    - name: staging
      namespace: staging
      cpu: "4"
      memory: "8Gi"
      default_cpu: "500m"
      default_memory: "512Mi"
    - name: production
      namespace: production
      cpu: "8"
      memory: "16Gi"
      default_cpu: "1"
      default_memory: "1Gi"

files:
  - path: generated/terraform/versions.tf
    content: |
      terraform {
        required_version = ">= 1.5.7"

        required_providers {
          azurerm = {
            source  = "hashicorp/azurerm"
            version = "~> 4.0"
          }
        }
      }

      provider "azurerm" {
        features {}
      }
  - path: generated/terraform/main.tf
    content: |
      resource "azurerm_resource_group" "this" {
        name     = "{{ .Values.resource_group }}"
        location = "{{ .Values.azure_location }}"

        tags = {
          Project   = "{{ .Values.project_name }}"
          ManagedBy = "platformctl"
        }
      }

      resource "azurerm_kubernetes_cluster" "this" {
        name                = "{{ .Values.cluster_name }}"
        location            = azurerm_resource_group.this.location
        resource_group_name = azurerm_resource_group.this.name
        dns_prefix          = "{{ .Values.cluster_name }}"
        kubernetes_version  = "{{ .Values.kubernetes_version }}"

        default_node_pool {
          name       = "general"
          node_count = {{ .Values.node_count }}
          vm_size    = "{{ .Values.node_vm_size }}"
        }

        identity {
          type = "SystemAssigned"
        }

        tags = {
          Project   = "{{ .Values.project_name }}"
          ManagedBy = "platformctl"
        }
      }
  - path: generated/terraform/outputs.tf
    content: |
      output "cluster_name" {
        value = azurerm_kubernetes_cluster.this.name
      }

      output "resource_group" {
        value = azurerm_resource_group.this.name
      }
  - path: generated/kubernetes/environments.yaml
    content: |
      {{- range .Values.environments }}
      ---
      apiVersion: v1
      kind: Namespace
      metadata:
        name: {{ .namespace }}
      ---
      apiVersion: v1
      kind: ResourceQuota
      metadata:
        name: {{ .namespace }}-quota
        namespace: {{ .namespace }}
      spec:
        hard:
          requests.cpu: "{{ .cpu }}"
          requests.memory: "{{ .memory }}"
          limits.cpu: "{{ .cpu }}"
          limits.memory: "{{ .memory }}"
      ---
      apiVersion: v1
      kind: LimitRange
      metadata:
        name: {{ .namespace }}-limits
        namespace: {{ .namespace }}
      spec:
        limits:
          - type: Container
            default:
              cpu: "{{ .default_cpu }}"
              memory: "{{ .default_memory }}"
            defaultRequest:
              cpu: "{{ .default_cpu }}"
              memory: "{{ .default_memory }}"
      {{- end }}
  - path: generated/helm-values/argocd-values.yaml
    content: |
      configs:
        params:
          server.insecure: true
  - path: generated/helm-values/kube-prometheus-stack-values.yaml
    content: |
      grafana:
        adminUser: "{{ .Values.grafana_admin_user }}"
  - path: generated/helm-values/ingress-nginx-values.yaml
    content: |
      controller:
        service:
          type: LoadBalancer

workflow:
  up:
    - name: terraform init
      command: terraform
      dir: generated/terraform
      args: ["init"]
    - name: terraform plan
      command: terraform
      dir: generated/terraform
      args: ["plan"]
    - name: terraform apply
      command: terraform
      dir: generated/terraform
      args: ["apply", "-auto-approve"]
    - name: az aks get-credentials
      command: az
      args: ["aks", "get-credentials", "--resource-group", "{{ .Values.resource_group }}", "--name", "{{ .Values.cluster_name }}", "--overwrite-existing"]
    - name: helm repo add argo
      command: helm
      args: ["repo", "add", "argo", "https://argoproj.github.io/argo-helm", "--force-update"]
    - name: helm repo add prometheus-community
      command: helm
      args: ["repo", "add", "prometheus-community", "https://prometheus-community.github.io/helm-charts", "--force-update"]
    - name: helm repo add ingress-nginx
      command: helm
      args: ["repo", "add", "ingress-nginx", "https://kubernetes.github.io/ingress-nginx", "--force-update"]
    - name: helm repo update
      command: helm
      args: ["repo", "update"]
    - name: kubectl apply platform manifests
      command: kubectl
      args: ["apply", "-f", "generated/kubernetes"]
    - name: install ArgoCD
      command: helm
      args: ["upgrade", "--install", "argocd", "argo/argo-cd", "-n", "{{ .Values.argocd_namespace }}", "--create-namespace", "-f", "generated/helm-values/argocd-values.yaml"]
    - name: install monitoring
      command: helm
      args: ["upgrade", "--install", "monitoring", "prometheus-community/kube-prometheus-stack", "-n", "{{ .Values.monitoring_namespace }}", "--create-namespace", "-f", "generated/helm-values/kube-prometheus-stack-values.yaml"]
    - name: install ingress-nginx
      command: helm
      args: ["upgrade", "--install", "ingress-nginx", "ingress-nginx/ingress-nginx", "-n", "{{ .Values.ingress_namespace }}", "--create-namespace", "-f", "generated/helm-values/ingress-nginx-values.yaml"]
  down:
    - name: terraform init
      command: terraform
      dir: generated/terraform
      args: ["init"]
    - name: terraform destroy
      command: terraform
      dir: generated/terraform
      args: ["destroy", "-auto-approve"]

outputs:
  success:
    - "Check cluster: kubectl get nodes"
    - "ArgoCD: kubectl -n {{ .Values.argocd_namespace }} port-forward svc/argocd-server 8080:443"
    - "Grafana: kubectl -n {{ .Values.monitoring_namespace }} port-forward svc/monitoring-grafana 3000:80"
