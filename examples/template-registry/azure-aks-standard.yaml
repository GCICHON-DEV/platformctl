apiVersion: platformctl.io/v1alpha2
kind: PlatformTemplate
metadata:
  name: azure-aks-standard
  description: Azure AKS example blueprint kept as a compatibility reference.
  tags: [azure, aks, terraform]
  maintainer: platformctl

requirements:
  warnings:
    - This AKS template is an example blueprint and is not part of the first supported AWS+local target.
  credentials:
    - name: azure
      description: Azure CLI must be logged in and pointed at the target subscription.
      command: az account show
  tools:
    - name: terraform
      version: "1.5.7"
      min_version: "1.5.7"
      version_args: ["version"]
      install_hint: https://developer.hashicorp.com/terraform/install
    - name: az
      version_args: ["version"]
      install_hint: https://learn.microsoft.com/cli/azure/install-azure-cli
    - name: kubectl
      version: "v1.34.0"
      version_args: ["version", "--client"]
      install_hint: https://kubernetes.io/docs/tasks/tools/

inputs:
  project_name:
    description: Project identifier used for Azure resource names.
    type: string
    required: true
    example: demo
    validation: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"
  region:
    description: Azure region for the resource group and AKS cluster.
    type: string
    required: true
    default: westeurope
    example: westeurope
  cluster_name:
    description: AKS cluster name.
    type: string
    required: true
    default: platformctl-aks
    example: demo-aks
    validation: "^[a-z0-9]([-a-z0-9]*[a-z0-9])?$"

files:
  - path: generated/terraform/main.tf
    content: |
      terraform {
        required_version = ">= 1.5.7"
        required_providers {
          azurerm = {
            source  = "hashicorp/azurerm"
            version = "~> 4.0"
          }
        }
      }

      provider "azurerm" {
        features {}
      }

      resource "azurerm_resource_group" "platform" {
        name     = "{{ .Values.project_name }}-rg"
        location = "{{ .Values.region }}"
      }

      resource "azurerm_kubernetes_cluster" "platform" {
        name                = "{{ .Values.cluster_name }}"
        location            = azurerm_resource_group.platform.location
        resource_group_name = azurerm_resource_group.platform.name
        dns_prefix          = "{{ .Values.project_name }}"

        default_node_pool {
          name       = "system"
          node_count = 1
          vm_size    = "Standard_B2s"
        }

        identity {
          type = "SystemAssigned"
        }
      }

      output "cluster_name" {
        value = azurerm_kubernetes_cluster.platform.name
      }

steps:
  plan:
    - name: terraform plan
      id: terraform-plan
      command: terraform
      dir: generated/terraform
      args: ["plan"]
      timeout_seconds: 1800
      suggestion: Check Azure credentials, subscription selection, and Terraform provider errors.
  apply:
    - name: terraform init
      id: terraform-init
      command: terraform
      dir: generated/terraform
      args: ["init"]
      timeout_seconds: 900
      suggestion: Check network access to Terraform registry and provider downloads.
    - name: terraform apply
      id: terraform-apply
      command: terraform
      dir: generated/terraform
      args: ["apply", "-auto-approve"]
      timeout_seconds: 3600
      suggestion: Check Azure credentials, quota, and Terraform provider errors.
  destroy:
    - name: terraform init
      id: terraform-init-destroy
      command: terraform
      dir: generated/terraform
      args: ["init"]
      timeout_seconds: 900
      suggestion: Check network access to Terraform registry and provider downloads.
    - name: terraform destroy
      id: terraform-destroy
      command: terraform
      dir: generated/terraform
      args: ["destroy", "-auto-approve"]
      timeout_seconds: 3600
      suggestion: Check Azure credentials and Terraform state locks.

outputs:
  success:
    - "AKS resources created. Fetch credentials with az aks get-credentials."
  notes:
    - "This AKS template is a reference blueprint and is not part of the primary supported AWS+local target."
  next_steps:
    - "Run platformctl status to inspect local state."
